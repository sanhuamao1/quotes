version: "3.8"

services:
  backend:
    build: .
    container_name: logpro-backend
    ports:
      - "60001:60001"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=60001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:60001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
